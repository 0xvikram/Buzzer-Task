<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth | Buzzer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="./index.html" class="logo">
        <div class="logo-icon">B</div>
        <span class="logo-text">buz<span>zer</span></span>
      </a>
      <div class="nav-actions">
        <a href="./dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="container-sm">
      <div class="card">
        <div class="tabs">
          <button class="tab active" id="auth-tab-login" type="button">Log in</button>
          <button class="tab" id="auth-tab-signup" type="button">Sign up</button>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label class="input-label" for="login-email">Email</label>
            <input class="input" id="login-email" type="email" required />
          </div>
          <div class="form-group">
            <label class="input-label" for="login-password">Password</label>
            <input class="input" id="login-password" type="password" required />
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%;">Log in</button>
        </form>

        <form id="signup-form" style="display:none;">
          <div class="form-group">
            <label class="input-label" for="signup-email">Email</label>
            <input class="input" id="signup-email" type="email" required />
          </div>
          <div class="form-group">
            <label class="input-label" for="signup-username">Username preview</label>
            <input class="input" id="signup-username" type="text" placeholder="Stored username defaults to your email prefix" />
          </div>
          <div class="form-group">
            <label class="input-label" for="signup-password">Password</label>
            <input class="input" id="signup-password" type="password" required />
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%;">Create account</button>
        </form>

        <form id="confirm-form" style="display:none;">
          <div class="form-group">
            <label class="input-label" for="confirm-email">Email</label>
            <input class="input" id="confirm-email" type="email" required />
          </div>
          <div class="form-group">
            <label class="input-label" for="confirm-code">Confirmation code</label>
            <input class="input" id="confirm-code" type="text" required />
          </div>
          <button class="btn btn-gold" type="submit" style="width:100%;">Confirm account</button>
        </form>

        <p class="text-sm text-muted mt-3" id="auth-status">Use your Cognito credentials to continue. New accounts use the email prefix as the initial username.</p>
      </div>
    </div>
  </main>

  <script type="module">
    import { initAuthPage } from "./app.js";
    initAuthPage();
  </script>
</body>
</html>
